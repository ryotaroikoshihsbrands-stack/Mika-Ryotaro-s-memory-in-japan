<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>国内旅行の思い出</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4f6;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

#map-wrapper{
display:flex;
justify-content:center;
padding:20px;
}

svg{
width:100%;
max-width:1200px;
height:auto;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.pref{
fill:#ffffff;
stroke:#333;
stroke-width:1;
cursor:pointer;
transition:0.2s;
}

.pref:hover{
opacity:0.8;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.modal-content{
background:white;
width:100%;
max-width:1000px;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
padding:25px;
}

.album-create{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.album-create input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.album-card{
border:1px solid #ddd;
padding:15px;
border-radius:14px;
margin-bottom:20px;
background:#fafafa;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
margin-top:15px;
}

.media-card{
background:white;
border-radius:10px;
padding:10px;
border:1px solid #ddd;
}

.media-card img,
.media-card video{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.custom-alert{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 20px;
border-radius:12px;
display:none;
z-index:999999;
font-weight:bold;
}

.delete-btn{
background:#ef4444;
color:white;
margin-top:10px;
}

</style>
</head>

<body>

<header>
国内旅行の思い出
</header>

<div id="map-wrapper">

<svg viewBox="0 0 1000 700">

<!-- 北海道 -->
<path id="北海道" class="pref"
d="M760 80 L860 80 L900 140 L860 210 L760 200 L720 130 Z"/>

<!-- 東北 -->

d="M700 230 L760 230 L760 270 L700 270 Z"/>

<path id="岩手県" class="pref"
d="M720 270 L770 270 L770 330 L720 330 Z"/>

<path id="宮城県" class="pref"
d="M690 330 L740 330 L740 370 L690 370 Z"/>

<path id="秋田県" class="pref"
d="M660 270 L710 270 L710 330 L660 330 Z"/>

<path id="山形県" class="pref"
d="M650 330 L700 330 L700 380 L650 380 Z"/>

<path id="福島県" class="pref"
d="M650 390 L720 390 L720 450 L650 450 Z"/>

<!-- 関東 -->
<path id="東京都" class="pref"
d="M660 500 L700 500 L700 540 L660 540 Z"/>

<path id="神奈川県" class="pref"
d="M630 540 L690 540 L690 580 L630 580 Z"/>

<path id="埼玉県" class="pref"
d="M620 470 L680 470 L680 510 L620 510 Z"/>

<path id="千葉県" class="pref"
d="M700 500 L760 500 L760 600 L700 600 Z"/>

<!-- 中部 -->
<path id="新潟県" class="pref"
d="M560 350 L650 350 L650 420 L560 420 Z"/>

<path id="長野県" class="pref"
d="M520 450 L620 450 L620 520 L520 520 Z"/>

<path id="静岡県" class="pref"
d="M540 540 L650 540 L650 590 L540 590 Z"/>

<!-- 関西 -->
<path id="大阪府" class="pref"
d="M420 520 L470 520 L470 560 L420 560 Z"/>

<path id="京都府" class="pref"
d="M420 450 L500 450 L500 510 L420 510 Z"/>

<path id="兵庫県" class="pref"
d="M340 470 L430 470 L430 530 L340 530 Z"/>

<!-- 中国 -->
<path id="広島県" class="pref"
d="M220 470 L320 470 L320 530 L220 530 Z"/>

<path id="岡山県" class="pref"
d="M320 470 L390 470 L390 520 L320 520 Z"/>

<!-- 四国 -->
<path id="愛媛県" class="pref"
d="M260 560 L340 560 L340 600 L260 600 Z"/>

<path id="香川県" class="pref"
d="M330 530 L390 530 L390 560 L330 560 Z"/>

<!-- 九州 -->
<path id="福岡県" class="pref"
d="M120 470 L200 470 L200 530 L120 530 Z"/>

<path id="熊本県" class="pref"
d="M120 540 L190 540 L190 610 L120 610 Z"/>

<path id="鹿児島県" class="pref"
d="M90 620 L170 620 L170 690 L90 690 Z"/>

<!-- 沖縄 -->
<path id="沖縄県" class="pref"
d="M40 650 L90 650 L90 680 L40 680 Z"/>

</svg>

</div>

<div class="custom-alert" id="customAlert"></div>

<div class="modal" id="modal">

<div class="modal-content">

<h2 id="modalTitle"></h2>

<div class="album-create">

<input
type="text"
id="albumName"
placeholder="アルバム名"
>

<input
type="color"
id="albumColor"
value="#10b981"
>

<button
style="background:#10b981;color:white;"
onclick="createAlbum()"
>
アルバム作成
</button>

</div>

<div id="albumList"></div>

<button
style="background:#ef4444;color:white;"
onclick="closeModal()"
>
閉じる
</button>

</div>

</div>

<script>

const CLIENT_ID = '1056269199594-iqiu3isr31l990fsv7oh5g0bgolfs8ei.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCbNpT1jzvscfRvM9KR775uypil01PWToM';
const FOLDER_ID = '130mpd1jAO0Qh9NS96838QbZ6Y9Tmqzum?usp=drive_link';

const DISCOVERY_DOC =
'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

const SCOPES =
'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let currentPrefecture = '';
let albumData = {};

window.alert = function(){};
window.confirm = function(){ return true; };

function showAlert(message){

const box =
document.getElementById('customAlert');

box.innerText = message;

box.style.display = 'block';

setTimeout(()=>{
box.style.display='none';
},2500);

}

function gapiLoaded(){

gapi.load('client', async ()=>{

await gapi.client.init({
apiKey: API_KEY,
discoveryDocs:[DISCOVERY_DOC]
});

initializeGis();

});

}

function initializeGis(){

tokenClient =
google.accounts.oauth2.initTokenClient({

client_id: CLIENT_ID,
scope: SCOPES,

callback:(resp)=>{

if(resp.error){

showAlert('Google認証失敗');
return;

}

showAlert('Google Drive接続完了');

}

});

requestAccess();

}

function requestAccess(){

tokenClient.requestAccessToken({
prompt:'consent'
});

}

gapiLoaded();

const modal =
document.getElementById('modal');

function openModal(pref){

currentPrefecture = pref;

document.getElementById('modalTitle').innerText =
pref + ' のアルバム';

modal.style.display='flex';

renderAlbums();

}

function closeModal(){

modal.style.display='none';

}

document.querySelectorAll('.pref').forEach(pref=>{

pref.addEventListener('click',()=>{

openModal(pref.id);

});

});

function createAlbum(){

const name =
document.getElementById('albumName').value.trim();

const color =
document.getElementById('albumColor').value;

if(!name){

showAlert('アルバム名を入力してください');
return;

}

if(!albumData[currentPrefecture]){

albumData[currentPrefecture] = [];

}

albumData[currentPrefecture].push({

name:name,
color:color,
files:[]

});

paintMap();

renderAlbums();

showAlert('アルバム作成完了');

}

function renderAlbums(){

const list =
document.getElementById('albumList');

list.innerHTML='';

const albums =
albumData[currentPrefecture] || [];

if(albums.length===0){

list.innerHTML='<p>アルバムはありません</p>';
return;

}

albums.forEach((album,index)=>{

const div =
document.createElement('div');

div.className='album-card';

div.innerHTML = `

<h3>${album.name}</h3>

<p>
色：
<span style="
display:inline-block;
width:20px;
height:20px;
background:${album.color};
border-radius:50%;
"></span>
</p>

<input
type="file"
multiple
accept="image/*,video/*"
onchange="uploadFiles(${index},event)"
>

<button
class="delete-btn"
onclick="deleteAlbum(${index})"
>
アルバム削除
</button>

<div
class="gallery"
id="gallery-${index}"
></div>

`;

list.appendChild(div);

renderGallery(index);

});

}

function deleteAlbum(index){

albumData[currentPrefecture].splice(index,1);

renderAlbums();

paintMap();

showAlert('アルバム削除完了');

}

function paintMap(){

document.querySelectorAll('.pref').forEach(pref=>{

pref.style.fill='#ffffff';

});

Object.keys(albumData).forEach(pref=>{

const albums = albumData[pref];

if(albums.length>0){

const latest =
albums[albums.length-1];

const target =
document.getElementById(pref);

if(target){

target.style.fill = latest.color;

}

}

});

}

async function uploadFiles(albumIndex,event){

const files =
Array.from(event.target.files);

for(const file of files){

await uploadToDrive(file,albumIndex);

}

showAlert('アップロード完了');

}

async function uploadToDrive(file,albumIndex){

const accessToken =
gapi.client.getToken().access_token;

const metadata = {

name:file.name,
parents:[FOLDER_ID]

};

const form = new FormData();

form.append(
'metadata',
new Blob(
[JSON.stringify(metadata)],
{type:'application/json'}
)
);

form.append('file',file);

const response = await fetch(
'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
{
method:'POST',
headers:new Headers({
Authorization:'Bearer '+accessToken
}),
body:form
}
);

const data = await response.json();

await gapi.client.drive.permissions.create({

fileId:data.id,

resource:{
role:'reader',
type:'anyone'
}

});

const fileUrl =
`https://drive.google.com/uc?id=${data.id}`;

albumData[currentPrefecture][albumIndex]
.files.push({

url:fileUrl,
type:file.type

});

renderGallery(albumIndex);

}

function renderGallery(albumIndex){

const gallery =
document.getElementById(`gallery-${albumIndex}`);

if(!gallery)return;

gallery.innerHTML='';

const files =
albumData[currentPrefecture][albumIndex].files;

files.forEach(file=>{

const div =
document.createElement('div');

div.className='media-card';

if(file.type.startsWith('image')){

div.innerHTML =
`<img src="${file.url}">`;

}else{

div.innerHTML = `
<video controls>
<source src="${file.url}">
</video>
`;

}

gallery.appendChild(div);

});

}

</script>

</body>
</html>
