<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>国内旅行の思い出</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4f6;
}

header{
background:#111827;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#map-container{
display:flex;
justify-content:center;
padding:20px;
}

svg{
width:100%;
max-width:1000px;
height:auto;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.pref{
fill:white;
stroke:#333;
stroke-width:1;
cursor:pointer;
transition:0.2s;
}

.pref:hover{
opacity:0.8;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal-content{
background:white;
width:100%;
max-width:1000px;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
padding:20px;
}

.album-create{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.album-create input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
margin-top:15px;
}

.media-card{
background:white;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
}

.media-card img,
.media-card video{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.album-card{
border:1px solid #ddd;
padding:15px;
border-radius:14px;
margin-bottom:20px;
background:#fafafa;
}

button{
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.custom-alert{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 20px;
border-radius:12px;
display:none;
z-index:99999;
font-weight:bold;
}

</style>
</head>

<body>

<header>
国内旅行の思い出
</header>

<div id="map-container">

<svg viewBox="0 0 1000 600">

<path id="北海道" class="pref" d="M750 50 L850 50 L850 150 L750 150 Z"/>
<path id="青森県" class="pref" d="M700 180 L760 180 L760 220 L700 220 Z"/>
<path id="東京都" class="pref" d="M640 300 L680 300 L680 340 L640 340 Z"/>
<path id="大阪府" class="pref" d="M560 340 L600 340 L600 380 L560 380 Z"/>
<path id="福岡県" class="pref" d="M420 420 L470 420 L470 470 L420 470 Z"/>
<path id="沖縄県" class="pref" d="M200 520 L260 520 L260 560 L200 560 Z"/>

</svg>

</div>

<div class="custom-alert" id="customAlert"></div>

<div class="modal" id="modal">

<div class="modal-content">

<h2 id="modalTitle"></h2>

<div class="album-create">

<input
type="text"
id="albumName"
placeholder="アルバム名"
>

<input
type="color"
id="albumColor"
value="#10b981"
>

<button onclick="createAlbum()">
アルバム作成
</button>

</div>

<div id="albumList"></div>

<button onclick="closeModal()">
閉じる
</button>

</div>
</div>

<script>

const CLIENT_ID = '1056269199594-iqiu3isr31l990fsv7oh5g0bgolfs8ei.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCbNpT1jzvscfRvM9KR775uypil01PWToM';
const FOLDER_ID = '130mpd1jAO0Qh9NS96838QbZ6Y9Tmqzum?usp=drive_link';

const DISCOVERY_DOC =
'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

const SCOPES =
'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let currentPrefecture = '';
let albumData = {};

window.alert = function(){};
window.confirm = function(){return true;};

function showAlert(message){

const box = document.getElementById('customAlert');

box.innerText = message;

box.style.display = 'block';

setTimeout(()=>{
box.style.display = 'none';
},2500);

}

function gapiLoaded(){

gapi.load('client', async ()=>{

await gapi.client.init({
apiKey: API_KEY,
discoveryDocs: [DISCOVERY_DOC],
});

initializeGis();

});

}

function initializeGis(){

tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: SCOPES,
callback: async(resp)=>{

if(resp.error){
showAlert('Google認証失敗');
return;
}

showAlert('Google Drive接続完了');

}
});

requestAccess();

}

function requestAccess(){

tokenClient.requestAccessToken({
prompt:'consent'
});

}

gapiLoaded();

const modal = document.getElementById('modal');

function openModal(pref){

currentPrefecture = pref;

document.getElementById('modalTitle').innerText =
pref + ' のアルバム';

modal.style.display = 'flex';

renderAlbums();

}

function closeModal(){
modal.style.display = 'none';
}

document.querySelectorAll('.pref').forEach(pref=>{

pref.addEventListener('click',()=>{

openModal(pref.id);

});

});

function createAlbum(){

const name =
document.getElementById('albumName').value.trim();

const color =
document.getElementById('albumColor').value;

if(!name){

showAlert('アルバム名を入力してください');

return;

}

if(!albumData[currentPrefecture]){

albumData[currentPrefecture] = [];

}

albumData[currentPrefecture].push({
name:name,
color:color,
files:[]
});

paintMap();

renderAlbums();

showAlert('アルバム作成完了');

}

function renderAlbums(){

const list = document.getElementById('albumList');

list.innerHTML = '';

const albums =
albumData[currentPrefecture] || [];

albums.forEach((album,index)=>{

const div = document.createElement('div');

div.className = 'album-card';

div.innerHTML = `

<h3>${album.name}</h3>

<p>
色：
<span style="
display:inline-block;
width:20px;
height:20px;
background:${album.color};
border-radius:50%;
"></span>
</p>

<input
type="file"
multiple
accept="image/*,video/*"
onchange="uploadFiles(${index}, event)"
>

<div class="gallery" id="gallery-${index}"></div>

`;

list.appendChild(div);

renderGallery(index);

});

}

function paintMap(){

Object.keys(albumData).forEach(pref=>{

const albums = albumData[pref];

if(albums.length > 0){

const latest =
albums[albums.length - 1];

const target =
document.getElementById(pref);

if(target){

target.style.fill = latest.color;

}

}

});

}

async function uploadFiles(albumIndex,event){

const files = Array.from(event.target.files);

for(const file of files){

await uploadToDrive(file,albumIndex);

}

showAlert('アップロード完了');

}

async function uploadToDrive(file,albumIndex){

const accessToken =
gapi.client.getToken().access_token;

const metadata = {
name:file.name,
parents:[FOLDER_ID]
};

const form = new FormData();

form.append(
'metadata',
new Blob(
[JSON.stringify(metadata)],
{type:'application/json'}
)
);

form.append('file',file);

const response = await fetch(
'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
{
method:'POST',
headers:new Headers({
Authorization:'Bearer ' + accessToken
}),
body:form
}
);

const data = await response.json();

await gapi.client.drive.permissions.create({
fileId:data.id,
resource:{
role:'reader',
type:'anyone'
}
});

const fileUrl =
`https://drive.google.com/uc?id=${data.id}`;

albumData[currentPrefecture][albumIndex].files.push({
url:fileUrl,
type:file.type
});

renderGallery(albumIndex);

}

function renderGallery(albumIndex){

const gallery =
document.getElementById(`gallery-${albumIndex}`);

if(!gallery)return;

gallery.innerHTML = '';

const files =
albumData[currentPrefecture][albumIndex].files;

files.forEach(file=>{

const div = document.createElement('div');

div.className = 'media-card';

if(file.type.startsWith('image')){

div.innerHTML =
`<img src="${file.url}">`;

}else{

div.innerHTML = `
<video controls>
<source src="${file.url}">
</video>
`;

}

gallery.appendChild(div);

});

}

</script>

</body>
</html>
