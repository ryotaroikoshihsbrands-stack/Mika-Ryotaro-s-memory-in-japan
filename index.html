height:auto;
background:white;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
padding:20px;
}

.pref{
fill:#ffffff;
stroke:#333;
stroke-width:1;
cursor:pointer;
transition:0.2s;
}

.pref:hover{
opacity:0.8;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);

justify-content:center;
align-items:center;
z-index:9999;

}

.modal-content{

width:100%;
max-width:1000px;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
padding:24px;
}

.album-create{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.album-create input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.create-btn{
background:#10b981;
color:white;
}

.close-btn{
background:#ef4444;
color:white;
margin-top:20px;
}

.delete-btn{
background:#dc2626;
color:white;
margin-top:10px;
}

.album-card{
background:#fafafa;
border:1px solid #ddd;
border-radius:14px;
padding:16px;
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
margin-top:16px;
}

.media-card{
background:white;
border-radius:10px;
padding:10px;
border:1px solid #ddd;
}

.media-card img,
.media-card video{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.custom-alert{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 20px;
border-radius:12px;
display:none;
z-index:999999;
font-weight:bold;
}

</style>

<div class="album-create">

<input
type="text"
id="albumName"
placeholder="アルバム名"
>

<input
type="color"
id="albumColor"
value="#10b981"
>

<button
class="create-btn"
onclick="createAlbum()"
>
アルバム作成
</button>

</div>

<div id="albumList"></div>

class="close-btn"
onclick="closeModal()"
>
閉じる
</button>

<script>

const CLIENT_ID = '1056269199594-iqiu3isr31l990fsv7oh5g0bgolfs8ei.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCbNpT1jzvscfRvM9KR775uypil01PWToM';
const FOLDER_ID = '130mpd1jAO0Qh9NS96838QbZ6Y9Tmqzum';

const DISCOVERY_DOC =
'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

const SCOPES =
'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let currentPrefecture = '';
let albumData = {};

window.alert = function(){};
window.confirm = function(){return true;};

function showAlert(message){

const box =
document.getElementById('customAlert');

box.innerText = message;

box.style.display = 'block';

setTimeout(()=>{
box.style.display='none';
},2500);

}

function gapiLoaded(){

gapi.load('client', async()=>{

await gapi.client.init({
apiKey:API_KEY,
discoveryDocs:[DISCOVERY_DOC]
});

initializeGis();

});

}

function initializeGis(){

tokenClient =
google.accounts.oauth2.initTokenClient({

client_id:CLIENT_ID,
scope:SCOPES,

callback:(resp)=>{

if(resp.error){

showAlert('Google認証失敗');
return;

}

showAlert('Google Drive接続完了');

}

});

requestAccess();

}

function requestAccess(){

tokenClient.requestAccessToken({
prompt:'consent'
});

}

gapiLoaded();

const modal =
document.getElementById('modal');

function openModal(pref){

currentPrefecture = pref;

document.getElementById('modalTitle').innerText =
pref + ' のアルバム';

modal.style.display='flex';

renderAlbums();

}

function closeModal(){

modal.style.display='none';

}

document.querySelectorAll('.pref').forEach(pref=>{

pref.addEventListener('click',()=>{

openModal(pref.id);

});

});

function createAlbum(){

const name =
document.getElementById('albumName').value.trim();

const color =
document.getElementById('albumColor').value;

if(!name){

showAlert('アルバム名を入力してください');
return;

}

if(!albumData[currentPrefecture]){

albumData[currentPrefecture]=[];

}

albumData[currentPrefecture].push({

name:name,
color:color,
files:[]

});

paintMap();

renderAlbums();

showAlert('アルバム作成完了');

}

function renderAlbums(){

const list =
document.getElementById('albumList');

list.innerHTML='';

const albums =
albumData[currentPrefecture] || [];

if(albums.length===0){

list.innerHTML='<p>アルバムはありません</p>';
return;

}

albums.forEach((album,index)=>{

const div =
document.createElement('div');

div.className='album-card';

div.innerHTML = `

<h3>${album.name}</h3>

<p>
色：
<span style="
display:inline-block;
width:20px;
height:20px;
background:${album.color};
border-radius:50%;
"></span>
</p>

<input
type="file"
multiple
accept="image/*,video/*"
onchange="uploadFiles(${index},event)"
>

<button
class="delete-btn"
onclick="deleteAlbum(${index})"
>
アルバム削除
</button>

<div
class="gallery"
id="gallery-${index}"
></div>

`;

list.appendChild(div);

renderGallery(index);

});

}

function deleteAlbum(index){

albumData[currentPrefecture]
.splice(index,1);

renderAlbums();

paintMap();

showAlert('アルバム削除完了');

}

function paintMap(){

document.querySelectorAll('.pref')
.forEach(pref=>{

pref.style.fill='#ffffff';

});

Object.keys(albumData).forEach(pref=>{

const albums = albumData[pref];

if(albums.length>0){

const latest =
albums[albums.length-1];

const target =
document.getElementById(pref);

if(target){

target.style.fill = latest.color;

}

}

});

}

async function uploadFiles(albumIndex,event){

const files =
Array.from(event.target.files);

for(const file of files){

await uploadToDrive(file,albumIndex);

}

showAlert('アップロード完了');

}

async function uploadToDrive(file,albumIndex){

const accessToken =
gapi.client.getToken().access_token;

const metadata = {

name:file.name,
parents:[FOLDER_ID]

};

const form = new FormData();

form.append(
'metadata',
new Blob(
[JSON.stringify(metadata)],
{type:'application/json'}
)
);

form.append('file',file);

const response = await fetch(
'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
{
method:'POST',
headers:new Headers({
Authorization:'Bearer '+accessToken
}),
body:form
}
);

const data = await response.json();

await gapi.client.drive.permissions.create({

fileId:data.id,

resource:{
role:'reader',
type:'anyone'
}

});

const fileUrl =
`https://drive.google.com/uc?id=${data.id}`;

albumData[currentPrefecture][albumIndex]
.files.push({

url:fileUrl,
type:file.type

});

renderGallery(albumIndex);

}

function renderGallery(albumIndex){

const gallery =
document.getElementById(`gallery-${albumIndex}`);

if(!gallery)return;

gallery.innerHTML='';

const files =
albumData[currentPrefecture][albumIndex].files;

files.forEach(file=>{

const div =
document.createElement('div');

div.className='media-card';

if(file.type.startsWith('image')){

div.innerHTML =
`<img src="${file.url}">`;

}else{

div.innerHTML = `
<video controls>
<source src="${file.url}">
</video>
`;

}

gallery.appendChild(div);

});

}

</script>
