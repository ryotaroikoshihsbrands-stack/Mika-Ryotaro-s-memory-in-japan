<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本アルバムマップ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
      max-width: 1200px;
      margin: auto;
    }

    .description {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .prefecture {
      background: white;
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid #e5e7eb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      user-select: none;
    }

    .prefecture:hover {
      transform: translateY(-2px);
    }

    .prefecture.active {
      background: #10b981;
      color: white;
      border-color: #059669;
    }

    .pref-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .album-count {
      font-size: 12px;
      opacity: 0.8;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 700px;
      border-radius: 20px;
      padding: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .close-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .upload-box {
      margin-bottom: 20px;
      padding: 14px;
      background: #f9fafb;
      border-radius: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .photo-card {
      background: #fafafa;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .photo-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .photo-actions {
      padding: 8px;
    }

    .delete-btn {
      width: 100%;
      border: none;
      background: #ef4444;
      color: white;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .map-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <header>日本アルバムマップ</header>

  <div class="container">
    <div id="japanMap" class="japan-map"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="close-btn" onclick="closeModal()">閉じる</button>
      </div>

      <div class="upload-box">
        <input type="text" id="albumName" placeholder="アルバム名を入力">
        <input type="color" id="albumColor" value="#10b981">
        <button onclick="createAlbum()">アルバム作成</button>
      </div>

      <div id="albumList"></div>
    </div>
  </div>

  <script>
    const prefectures = [
      '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
      '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
      '新潟県','富山県','石川県','福井県','山梨県','長野県',
      '岐阜県','静岡県','愛知県','三重県',
      '滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
      '鳥取県','島根県','岡山県','広島県','山口県',
      '徳島県','香川県','愛媛県','高知県',
      '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県',
      '沖縄県'
    ];

    const japanMap = document.getElementById('japanMap');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const albumList = document.getElementById('albumList');

    let currentPrefecture = '';

    function getData() {
      return JSON.parse(localStorage.getItem('travelAlbums') || '{}');
    }

    function saveData(data) {
      localStorage.setItem('travelAlbums', JSON.stringify(data));
    }

    function renderMap() {
      const data = getData();
      japanMap.innerHTML = '';

      prefectures.forEach(pref => {
        const item = document.createElement('div');
        item.className = 'prefecture';

        const albums = data[pref] || [];

        if (albums.length > 0) {
          item.style.background = albums[albums.length - 1].color;
          item.style.color = 'white';
        }

        item.innerHTML = `<div class="pref-name">${pref}</div>`;

        item.onclick = () => openModal(pref);

        japanMap.appendChild(item);
      });
    }

    function openModal(pref) {
      currentPrefecture = pref;
      modalTitle.innerText = pref + ' のアルバム';
      modal.style.display = 'flex';
      renderAlbums();
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    function createAlbum() {
      const name = document.getElementById('albumName').value.trim();
      const color = document.getElementById('albumColor').value;

      if (!name) {
        alert('アルバム名を入力してください');
        return;
      }

      const data = getData();

      if (!data[currentPrefecture]) {
        data[currentPrefecture] = [];
      }

      const exists = data[currentPrefecture].some(a => a.name === name);

      if (exists) {
        alert('同じアルバム名があります');
        return;
      }

      data[currentPrefecture].push({
        name,
        color,
        photos: []
      });

      saveData(data);

      document.getElementById('albumName').value = '';

      renderAlbums();
      renderMap();
    }

    function renderAlbums() {
      const data = getData();
      const albums = data[currentPrefecture] || [];

      albumList.innerHTML = '';

      if (albums.length === 0) {
        albumList.innerHTML = '<p>アルバムがありません</p>';
        return;
      }

      albums.forEach((album, index) => {
        const div = document.createElement('div');
        div.style.border = '1px solid #ddd';
        div.style.padding = '12px';
        div.style.marginBottom = '10px';
        div.style.borderRadius = '12px';
        div.style.background = '#fafafa';

        div.innerHTML = `
          <h3>${album.name}</h3>
          <p>カラー: <span style="display:inline-block;width:20px;height:20px;background:${album.color};border-radius:50%;vertical-align:middle"></span></p>
          <input type="file" multiple accept="image/*" onchange="uploadPhotos(${index}, event)">
          <div class="gallery" id="gallery-${index}"></div>
        `;

        albumList.appendChild(div);

        const gallery = div.querySelector(`#gallery-${index}`);

        album.photos.forEach((photo, photoIndex) => {
          const imgWrap = document.createElement('div');
          imgWrap.className = 'photo-card';

          imgWrap.innerHTML = `
            <img src="${photo}">
            <div class="photo-actions">
              <button class="delete-btn" onclick="deletePhoto(${index}, ${photoIndex})">削除</button>
            </div>
          `;

          gallery.appendChild(imgWrap);
        });
      });
    }

    function uploadPhotos(albumIndex, event) {
      const files = Array.from(event.target.files);
      const data = getData();

      let loaded = 0;

      files.forEach(file => {
        const reader = new FileReader();

        reader.onload = e => {
          data[currentPrefecture][albumIndex].photos.push(e.target.result);

          loaded++;

          if (loaded === files.length) {
            saveData(data);
            renderAlbums();
          }
        };

        reader.readAsDataURL(file);
      });
    }

    function deletePhoto(albumIndex, photoIndex) {
      const data = getData();
      data[currentPrefecture][albumIndex].photos.splice(photoIndex, 1);
      saveData(data);
      renderAlbums();
    }

    window.onclick = e => {
      if (e.target === modal) {
        closeModal();
      }
    };

    renderMap();
    }

    fileInput.addEventListener('change', event => {
      const files = Array.from(event.target.files);
      const albums = getAlbums();

      if (!albums[currentPrefecture]) {
        albums[currentPrefecture] = [];
      }

      let loaded = 0;

      files.forEach(file => {
        const reader = new FileReader();

        reader.onload = e => {
          albums[currentPrefecture].push(e.target.result);
          loaded++;

          if (loaded === files.length) {
            saveAlbums(albums);
            renderGallery();
            renderMap();
          }
        };

        reader.readAsDataURL(file);
      });
    });

    window.onclick = e => {
      if (e.target === modal) {
        closeModal();
      }
    };

    renderMap();
  </script>
</body>
</html>
