<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>国内旅行の思い出</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
}

header{
  background:#111827;
  color:white;
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.container{
  display:flex;
  justify-content:center;
  padding:20px;
}

#map{
  width:100%;
  max-width:1200px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

svg{
  width:100%;
  height:auto;
}

.prefecture{
  fill:white;
  stroke:#333;
  stroke-width:0.5;
  cursor:pointer;
  transition:0.2s;
}

.prefecture:hover{
  opacity:0.8;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.modal-content{
  background:white;
  width:100%;
  max-width:1000px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:20px;
  padding:20px;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  background:#ef4444;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.album-create{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.album-create input[type="text"]{
  flex:1;
  min-width:200px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.album-create button{
  background:#10b981;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.album-card{
  border:1px solid #ddd;
  border-radius:14px;
  padding:16px;
  margin-bottom:20px;
  background:#fafafa;
}

.album-radio-group{
  display:flex;
  gap:20px;
  margin:15px 0;
  flex-wrap:wrap;
}

.album-radio-group label{
  display:flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  font-weight:bold;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  margin-top:10px;
}

.media-card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #ddd;
  padding:10px;
}

.media-card img,
.media-card video{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
}

.delete-btn{
  width:100%;
  margin-top:8px;
  background:#ef4444;
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.hidden{
  display:none;
}

/* 通知 */

.custom-alert{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:14px 20px;
  border-radius:12px;
  z-index:99999;
  display:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  font-weight:bold;
}

/* confirm */

.confirm-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100000;
}

.confirm-box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.confirm-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.confirm-buttons button{
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.confirm-yes{
  background:#ef4444;
}

.confirm-no{
  background:#6b7280;
}

</style>
</head>

<body>

<header>
国内旅行の思い出
</header>

<div class="container">
<div id="map"></div>
</div>

<div
class="custom-alert"
id="customAlert"
></div>

<div
class="confirm-overlay"
id="confirmOverlay"
>

<div class="confirm-box">

<p id="confirmMessage">
削除しますか？
</p>

<div class="confirm-buttons">

<button
class="confirm-yes"
id="confirmYes"
>

削除

</button>

<button
class="confirm-no"
onclick="closeConfirm()"
>

キャンセル

</button>

</div>

</div>
</div>

<div class="modal" id="modal">

<div class="modal-content">

<div class="modal-header">

<h2 id="modalTitle"></h2>

<button
class="close-btn"
onclick="closeModal()"
>

閉じる

</button>

</div>

<div class="album-create">

<input
type="text"
id="albumName"
placeholder="アルバム名を入力"
>

<input
type="color"
id="albumColor"
value="#10b981"
>

<button onclick="createAlbum()">
アルバム作成
</button>

</div>

<div id="albumList"></div>

</div>
</div>

<script>

/* =========================
   IndexedDB
========================= */

const DB_NAME = 'TravelAlbumDB';
const DB_VERSION = 1;
const STORE_NAME = 'albums';

let db;

const request = indexedDB.open(
DB_NAME,
DB_VERSION
);

request.onupgradeneeded = event => {

db = event.target.result;

if(!db.objectStoreNames.contains(STORE_NAME)){

db.createObjectStore(
STORE_NAME,
{ keyPath:'prefecture' }
);

}

};

request.onsuccess = event => {

db = event.target.result;

loadMap();

};

request.onerror = () => {

showAlert('DB初期化失敗');

};

/* =========================
   alert / confirm 無効化
========================= */

window.alert = function(){};
window.confirm = function(){ return true; };

/* =========================
   要素
========================= */

const modal =
document.getElementById('modal');

const modalTitle =
document.getElementById('modalTitle');

const albumList =
document.getElementById('albumList');

const confirmOverlay =
document.getElementById('confirmOverlay');

const confirmYes =
document.getElementById('confirmYes');

let currentPrefecture = '';

/* =========================
   通知
========================= */

function showAlert(message){

const alertBox =
document.getElementById('customAlert');

alertBox.innerText = message;

alertBox.style.display = 'block';

setTimeout(() => {

alertBox.style.display = 'none';

}, 2500);

}

/* =========================
   confirm
========================= */

function openConfirm(message, callback){

document.getElementById(
'confirmMessage'
).innerText = message;

confirmOverlay.style.display = 'flex';

confirmYes.onclick = function(){

callback();

closeConfirm();

};

}

function closeConfirm(){

confirmOverlay.style.display = 'none';

}

/* =========================
   IndexedDB取得
========================= */

function getPrefectureData(prefecture){

return new Promise(resolve => {

const transaction =
db.transaction(
[STORE_NAME],
'readonly'
);

const store =
transaction.objectStore(STORE_NAME);

const req =
store.get(prefecture);

req.onsuccess = () => {

resolve(req.result || {
prefecture:prefecture,
albums:[]
});

};

});

}

function savePrefectureData(data){

return new Promise(resolve => {

const transaction =
db.transaction(
[STORE_NAME],
'readwrite'
);

const store =
transaction.objectStore(STORE_NAME);

store.put(data);

transaction.oncomplete = () => {

resolve();

};

});

}

/* =========================
   モーダル
========================= */

async function openModal(pref){

currentPrefecture = pref;

modalTitle.innerText =
pref + ' のアルバム';

modal.style.display = 'flex';

await renderAlbums();

}

function closeModal(){

modal.style.display = 'none';

}

/* =========================
   アルバム作成
========================= */

async function createAlbum(){

const name =
document.getElementById(
'albumName'
).value.trim();

const color =
document.getElementById(
'albumColor'
).value;

if(!name){

showAlert(
'アルバム名を入力してください'
);

return;

}

const data =
await getPrefectureData(
currentPrefecture
);

data.albums.push({

name:name,
color:color,
media:[]

});

await savePrefectureData(data);

document.getElementById(
'albumName'
).value = '';

await renderAlbums();

paintMap();

showAlert(
'アルバムを作成しました'
);

}

/* =========================
   アルバム削除
========================= */

function deleteAlbum(albumIndex){

openConfirm(
'このアルバムを削除しますか？',
async function(){

const data =
await getPrefectureData(
currentPrefecture
);

data.albums.splice(
albumIndex,
1
);

await savePrefectureData(data);

await renderAlbums();

paintMap();

showAlert(
'アルバムを削除しました'
);

}
);

}

/* =========================
   ラジオ切替
========================= */

function toggleAlbumMode(albumIndex, mode){

const uploadArea =
document.getElementById(
`upload-area-${albumIndex}`
);

const deleteArea =
document.getElementById(
`delete-area-${albumIndex}`
);

if(mode === 'upload'){

uploadArea.classList.remove(
'hidden'
);

deleteArea.classList.add(
'hidden'
);

}else{

uploadArea.classList.add(
'hidden'
);

deleteArea.classList.remove(
'hidden'
);

}

}

/* =========================
   描画
========================= */

async function renderAlbums(){

const data =
await getPrefectureData(
currentPrefecture
);

const albums =
data.albums || [];

albumList.innerHTML = '';

if(albums.length === 0){

albumList.innerHTML =
'<p>アルバムがありません</p>';

return;

}

albums.forEach((album, albumIndex) => {

const card =
document.createElement('div');

card.className = 'album-card';

card.innerHTML = `

<h3>${album.name}</h3>

<p>
色：
<span style="
display:inline-block;
width:20px;
height:20px;
background:${album.color};
border-radius:50%;
"></span>
</p>

<div class="album-radio-group">

<label>

<input
type="radio"
name="mode-${albumIndex}"
checked
onclick="toggleAlbumMode(${albumIndex}, 'upload')"
>

写真・動画追加

</label>

<label>

<input
type="radio"
name="mode-${albumIndex}"
onclick="toggleAlbumMode(${albumIndex}, 'delete')"
>

アルバム削除

</label>

</div>

<div id="upload-area-${albumIndex}">

<input
type="file"
multiple
accept="image/*,video/*"
onchange="uploadMedia(${albumIndex}, event)"
>

</div>

<div
id="delete-area-${albumIndex}"
class="hidden"
>

<button
class="delete-btn"
onclick="deleteAlbum(${albumIndex})"
>

このアルバムを削除

</button>

</div>

<div
class="gallery"
id="gallery-${albumIndex}"
></div>

`;

albumList.appendChild(card);

const gallery =
card.querySelector(
`#gallery-${albumIndex}`
);

album.media.forEach((item, mediaIndex) => {

const mediaCard =
document.createElement('div');

mediaCard.className = 'media-card';

if(item.type.startsWith('image')){

mediaCard.innerHTML = `

<img src="${item.data}">

<button
class="delete-btn"
onclick="deleteMedia(${albumIndex}, ${mediaIndex})"
>

削除

</button>

`;

}else{

mediaCard.innerHTML = `

<video controls>
<source src="${item.data}">
</video>

<button
class="delete-btn"
onclick="deleteMedia(${albumIndex}, ${mediaIndex})"
>

削除

</button>

`;

}

gallery.appendChild(mediaCard);

});

});

}

/* =========================
   アップロード
========================= */

async function uploadMedia(albumIndex, event){

const files =
Array.from(event.target.files);

const data =
await getPrefectureData(
currentPrefecture
);

for(const file of files){

const base64 =
await compressFile(file);

data.albums[albumIndex]
.media
.push({

type:file.type,
data:base64

});

}

await savePrefectureData(data);

await renderAlbums();

showAlert(
'保存しました'
);

}

/* =========================
   圧縮
========================= */

function compressFile(file){

return new Promise(resolve => {

if(file.type.startsWith('image')){

const reader =
new FileReader();

reader.onload = e => {

const img =
new Image();

img.onload = () => {

const canvas =
document.createElement('canvas');

const maxWidth = 1200;

const scale =
maxWidth / img.width;

canvas.width = maxWidth;
canvas.height =
img.height * scale;

const ctx =
canvas.getContext('2d');

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

resolve(
canvas.toDataURL(
'image/jpeg',
0.7
)
);

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

}else{

const reader =
new FileReader();

reader.onload = e => {

resolve(e.target.result);

};

reader.readAsDataURL(file);

}

});

}

/* =========================
   削除
========================= */

async function deleteMedia(
albumIndex,
mediaIndex
){

const data =
await getPrefectureData(
currentPrefecture
);

data.albums[albumIndex]
.media
.splice(mediaIndex,1);

await savePrefectureData(data);

await renderAlbums();

showAlert(
'削除しました'
);

}

/* =========================
   モーダル外
========================= */

window.onclick = e => {

if(e.target === modal){

closeModal();

}

};

/* =========================
   地図
========================= */

function loadMap(){

const width = 1000;
const height = 1200;

const svg = d3
.select('#map')
.append('svg')
.attr(
'viewBox',
`0 0 ${width} ${height}`
);

const projection =
d3.geoMercator()
.center([137,38])
.scale(1700)
.translate([width/2,height/2]);

const path =
d3.geoPath()
.projection(projection);

d3.json(
'https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson'
)
.then(data => {

svg.selectAll('path')
.data(data.features)
.enter()
.append('path')
.attr('class','prefecture')
.attr('d', path)
.attr(
'id',
d => d.properties.nam_ja
)
.on('click', (event,d) => {

openModal(
d.properties.nam_ja
);

});

paintMap();

});

}

/* =========================
   色変更
========================= */

async function paintMap(){

const transaction =
db.transaction(
[STORE_NAME],
'readonly'
);

const store =
transaction.objectStore(STORE_NAME);

const request =
store.getAll();

request.onsuccess = () => {

const allData =
request.result;

document
.querySelectorAll('.prefecture')
.forEach(pref => {

pref.style.fill = 'white';

const target =
allData.find(
d => d.prefecture === pref.id
);

if(
target &&
target.albums.length > 0
){

pref.style.fill =
target.albums[
target.albums.length - 1
].color;

}

});

};

}

</script>

</body>
</html>
