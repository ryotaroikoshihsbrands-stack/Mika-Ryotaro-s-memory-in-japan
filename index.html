<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>国内旅行の思い出</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4f6;
}

header{
background:#111827;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.login-btn{
background:#2563eb;
color:white;
}

.logout-btn{
background:#ef4444;
color:white;
}

.container{
padding:20px;
display:flex;
justify-content:center;
}

#map{
width:100%;
max-width:1200px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

svg{
width:100%;
height:auto;
}

.prefecture{
fill:white;
stroke:#333;
stroke-width:0.5;
cursor:pointer;
transition:0.2s;
}

.prefecture:hover{
opacity:0.8;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal-content{
background:white;
width:100%;
max-width:1000px;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
padding:20px;
}

.album-create{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.album-create input[type="text"]{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
margin-top:10px;
}

.media-card{
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
}

.media-card img,
.media-card video{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.album-card{
border:1px solid #ddd;
border-radius:14px;
padding:15px;
margin-bottom:20px;
background:#fafafa;
}

.custom-alert{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 20px;
border-radius:12px;
display:none;
z-index:99999;
font-weight:bold;
}

</style>
</head>

<body>

<header>
国内旅行の思い出
</header>

<div class="topbar">

<button
class="login-btn"
onclick="handleAuthClick()"
>
Googleログイン
</button>

<button
class="logout-btn"
onclick="handleSignoutClick()"
>
ログアウト
</button>

</div>

<div class="container">
<div id="map"></div>
</div>

<div class="custom-alert" id="customAlert"></div>

<div class="modal" id="modal">
<div class="modal-content">

<h2 id="modalTitle"></h2>

<div class="album-create">

<input
id="albumName"
type="text"
placeholder="アルバム名"
>

<input
id="albumColor"
type="color"
value="#10b981"
>

<button onclick="createAlbum()">
アルバム作成
</button>

</div>

<div id="albumList"></div>

<button onclick="closeModal()">
閉じる
</button>

</div>
</div>

<script>

const CLIENT_ID = '1056269199594-iqiu3isr31l990fsv7oh5g0bgolfs8ei.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCbNpT1jzvscfRvM9KR775uypil01PWToM;
const FOLDER_ID = '130mpd1jAO0Qh9NS96838QbZ6Y9Tmqzum?usp=drive_link';

const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let gapiInited = false;
let gisInited = false;
let currentPrefecture = '';
let albumData = {};

window.alert = function(){};
window.confirm = function(){return true;};

function showAlert(message){

const box = document.getElementById('customAlert');

box.innerText = message;
box.style.display = 'block';

setTimeout(()=>{
box.style.display = 'none';
},2500);

}

async function gapiLoaded(){

await gapi.load('client', initializeGapiClient);

}

async function initializeGapiClient(){

await gapi.client.init({
apiKey: API_KEY,
discoveryDocs: [DISCOVERY_DOC],
});

gapiInited = true;

}

function gisLoaded(){

tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: SCOPES,
callback: '',
});

gisInited = true;

}

function handleAuthClick(){

if(!tokenClient){
showAlert('Google API初期化中');
return;
}

tokenClient.callback = async (resp) => {

if(resp.error !== undefined){
throw(resp);
}

showAlert('ログイン成功');

await refreshAllAlbums();

};

if(gapi.client.getToken() === null){

tokenClient.requestAccessToken({prompt: 'consent'});

}else{

tokenClient.requestAccessToken({prompt: ''});

}

}

function handleSignoutClick(){

const token = gapi.client.getToken();

if(token !== null){

google.accounts.oauth2.revoke(token.access_token);

gapi.client.setToken('');

showAlert('ログアウトしました');

}

}

const modal = document.getElementById('modal');
const albumList = document.getElementById('albumList');

function openModal(pref){

currentPrefecture = pref;

document.getElementById('modalTitle').innerText = pref + ' のアルバム';

modal.style.display = 'flex';

renderAlbums(pref);

}

function closeModal(){
modal.style.display = 'none';
}

function createAlbum(){

const name = document.getElementById('albumName').value.trim();
const color = document.getElementById('albumColor').value;

if(!name){
showAlert('アルバム名を入力してください');
return;
}

if(!albumData[currentPrefecture]){
albumData[currentPrefecture] = [];
}

albumData[currentPrefecture].push({
name:name,
color:color,
files:[]
});

renderAlbums(currentPrefecture);
paintMap();

showAlert('アルバム作成完了');

}

function renderAlbums(pref){

albumList.innerHTML = '';

const albums = albumData[pref] || [];

albums.forEach((album,index)=>{

const card = document.createElement('div');
card.className = 'album-card';

card.innerHTML = `

<h3>${album.name}</h3>

<p>
色：
<span style="
background:${album.color};
width:20px;
height:20px;
display:inline-block;
border-radius:50%;
"></span>
</p>

<input
multiple
accept="image/*,video/*"
type="file"
onchange="uploadFiles(${index}, event)"
>

<div class="gallery" id="gallery-${index}"></div>

`;

albumList.appendChild(card);

renderGallery(index);

});

}

async function uploadFiles(albumIndex,event){

const files = Array.from(event.target.files);

for(const file of files){

await uploadToDrive(file, albumIndex);

}

showAlert('アップロード完了');

}

async function uploadToDrive(file,albumIndex){

const metadata = {
name:file.name,
parents:[FOLDER_ID]
};

const accessToken = gapi.client.getToken().access_token;

const form = new FormData();

form.append(
'metadata',
new Blob(
[JSON.stringify(metadata)],
{type:'application/json'}
)
);

form.append('file', file);

const response = await fetch(
'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
{
method:'POST',
headers:new Headers({
Authorization:'Bearer ' + accessToken
}),
body:form
}
);

const data = await response.json();

await gapi.client.drive.permissions.create({
fileId:data.id,
resource:{
role:'reader',
type:'anyone'
}
});

const fileUrl = `https://drive.google.com/uc?id=${data.id}`;

albumData[currentPrefecture][albumIndex].files.push({
name:file.name,
url:fileUrl,
type:file.type
});

renderGallery(albumIndex);

}

function renderGallery(albumIndex){

const gallery = document.getElementById(`gallery-${albumIndex}`);

if(!gallery)return;

gallery.innerHTML = '';

const files = albumData[currentPrefecture][albumIndex].files;

files.forEach(file=>{

const card = document.createElement('div');
card.className = 'media-card';

if(file.type.startsWith('image')){

card.innerHTML = `
<img src="${file.url}">
`;

}else{

card.innerHTML = `
<video controls>
<source src="${file.url}">
</video>
`;

}

gallery.appendChild(card);

});

}

function loadMap(){

const width = 1000;
const height = 1200;

const svg = d3
.select('#map')
.append('svg')
.attr('viewBox', `0 0 ${width} ${height}`);

const projection = d3.geoMercator()
.center([137,38])
.scale(1700)
.translate([width/2,height/2]);

const path = d3.geoPath().projection(projection);

d3.json(
'https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson'
)
.then(data=>{

svg.selectAll('path')
.data(data.features)
.enter()
.append('path')
.attr('class','prefecture')
.attr('d',path)
.attr('id',d=>d.properties.nam_ja)
.on('click',(event,d)=>{
openModal(d.properties.nam_ja);
});

paintMap();

});

}

function paintMap(){

Object.keys(albumData).forEach(pref=>{

const albums = albumData[pref];

if(albums.length > 0){

const color = albums[albums.length - 1].color;

const target = document.getElementById(pref);

if(target){
target.style.fill = color;
}

}

});

}

async function refreshAllAlbums(){

showAlert('Google Drive接続完了');

}

gapiLoaded();
gisLoaded();
loadMap();

</script>

</body>
</html>
