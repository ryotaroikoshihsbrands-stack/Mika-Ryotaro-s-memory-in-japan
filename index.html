<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>国内旅行の思い出</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
}

header{
  background:#111827;
  color:white;
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.container{
  display:flex;
  justify-content:center;
  padding:20px;
}

#map{
  width:100%;
  max-width:1200px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

svg{
  width:100%;
  height:auto;
}

.prefecture{
  fill:white;
  stroke:#333;
  stroke-width:0.5;
  cursor:pointer;
  transition:0.2s;
}

.prefecture:hover{
  opacity:0.8;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.modal-content{
  background:white;
  width:100%;
  max-width:900px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:20px;
  padding:20px;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  background:#ef4444;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.album-create{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.album-create input[type="text"]{
  flex:1;
  min-width:200px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.album-create button{
  background:#10b981;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.album-card{
  border:1px solid #ddd;
  border-radius:14px;
  padding:16px;
  margin-bottom:20px;
  background:#fafafa;
}

.album-radio-group{
  display:flex;
  gap:20px;
  margin:15px 0;
  flex-wrap:wrap;
}

.album-radio-group label{
  display:flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  font-weight:bold;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  margin-top:10px;
}

.photo-card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.delete-btn{
  width:100%;
  margin-top:5px;
  background:#ef4444;
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.hidden{
  display:none;
}

/* 通知 */

.custom-alert{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:14px 20px;
  border-radius:12px;
  z-index:99999;
  display:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  font-weight:bold;
}

/* 独自確認モーダル */

.confirm-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100000;
}

.confirm-box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.confirm-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.confirm-buttons button{
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.confirm-yes{
  background:#ef4444;
}

.confirm-no{
  background:#6b7280;
}

</style>
</head>

<body>

<header>
国内旅行の思い出
</header>

<div class="container">
<div id="map"></div>
</div>

<div
class="custom-alert"
id="customAlert"
></div>

<!-- 独自confirm -->

<div
class="confirm-overlay"
id="confirmOverlay"
>

<div class="confirm-box">

<p id="confirmMessage">
削除しますか？
</p>

<div class="confirm-buttons">

<button
class="confirm-yes"
id="confirmYes"
>

削除

</button>

<button
class="confirm-no"
onclick="closeConfirm()"
>

キャンセル

</button>

</div>

</div>
</div>

<div class="modal" id="modal">

<div class="modal-content">

<div class="modal-header">

<h2 id="modalTitle"></h2>

<button
class="close-btn"
onclick="closeModal()"
>
閉じる
</button>

</div>

<div class="album-create">

<input
type="text"
id="albumName"
placeholder="アルバム名を入力"
>

<input
type="color"
id="albumColor"
value="#10b981"
>

<button onclick="createAlbum()">
アルバム作成
</button>

</div>

<div id="albumList"></div>

</div>
</div>

<script>

const modal =
document.getElementById('modal');

const modalTitle =
document.getElementById('modalTitle');

const albumList =
document.getElementById('albumList');

const confirmOverlay =
document.getElementById('confirmOverlay');

const confirmYes =
document.getElementById('confirmYes');

let currentPrefecture = '';

window.alert = function(){};
window.confirm = function(){ return true; };

/* 通知 */

function showAlert(message){

const alertBox =
document.getElementById('customAlert');

alertBox.innerText = message;

alertBox.style.display = 'block';

setTimeout(() => {

alertBox.style.display = 'none';

}, 2500);

}

/* 独自confirm */

function openConfirm(message, callback){

document.getElementById(
'confirmMessage'
).innerText = message;

confirmOverlay.style.display = 'flex';

confirmYes.onclick = function(){

callback();

closeConfirm();

};

}

function closeConfirm(){

confirmOverlay.style.display = 'none';

}

function getData(){

return JSON.parse(
localStorage.getItem('travelAlbums') || '{}'
);

}

function saveData(data){

localStorage.setItem(
'travelAlbums',
JSON.stringify(data)
);

}

function openModal(pref){

currentPrefecture = pref;

modalTitle.innerText =
pref + ' のアルバム';

modal.style.display = 'flex';

renderAlbums();

}

function closeModal(){

modal.style.display = 'none';

}

function createAlbum(){

const name =
document.getElementById('albumName')
.value
.trim();

const color =
document.getElementById('albumColor')
.value;

if(!name){

showAlert(
'アルバム名を入力してください'
);

return;

}

const data = getData();

if(!data[currentPrefecture]){

data[currentPrefecture] = [];

}

data[currentPrefecture].push({

name:name,
color:color,
photos:[]

});

saveData(data);

document.getElementById(
'albumName'
).value = '';

renderAlbums();

paintMap();

showAlert(
'アルバムを作成しました'
);

}

function deleteAlbum(albumIndex){

openConfirm(
'このアルバムを削除しますか？',
function(){

const data = getData();

data[currentPrefecture]
.splice(albumIndex,1);

saveData(data);

renderAlbums();

paintMap();

showAlert(
'アルバムを削除しました'
);

}
);

}

function toggleAlbumMode(albumIndex, mode){

const uploadArea =
document.getElementById(
`upload-area-${albumIndex}`
);

const deleteArea =
document.getElementById(
`delete-area-${albumIndex}`
);

if(mode === 'upload'){

uploadArea.classList.remove(
'hidden'
);

deleteArea.classList.add(
'hidden'
);

}else{

uploadArea.classList.add(
'hidden'
);

deleteArea.classList.remove(
'hidden'
);

}

}

function renderAlbums(){

const data = getData();

const albums =
data[currentPrefecture] || [];

albumList.innerHTML = '';

if(albums.length === 0){

albumList.innerHTML =
'<p>アルバムがありません</p>';

return;

}

albums.forEach((album, albumIndex) => {

const card =
document.createElement('div');

card.className = 'album-card';

card.innerHTML = `

<h3>${album.name}</h3>

<p>

色：

<span style="
display:inline-block;
width:20px;
height:20px;
background:${album.color};
border-radius:50%;
"></span>

</p>

<div class="album-radio-group">

<label>

<input
type="radio"
name="mode-${albumIndex}"
checked
onclick="toggleAlbumMode(${albumIndex}, 'upload')"
>

写真追加

</label>

<label>

<input
type="radio"
name="mode-${albumIndex}"
onclick="toggleAlbumMode(${albumIndex}, 'delete')"
>

アルバム削除

</label>

</div>

<div id="upload-area-${albumIndex}">

<input
type="file"
multiple
accept="image/*"
onchange="uploadPhotos(${albumIndex}, event)"
>

</div>

<div
id="delete-area-${albumIndex}"
class="hidden"
>

<button
class="delete-btn"
onclick="deleteAlbum(${albumIndex})"
>

このアルバムを削除

</button>

</div>

<div
class="gallery"
id="gallery-${albumIndex}"
></div>

`;

albumList.appendChild(card);

const gallery =
card.querySelector(
`#gallery-${albumIndex}`
);

album.photos.forEach((photo, photoIndex) => {

const photoCard =
document.createElement('div');

photoCard.className = 'photo-card';

photoCard.innerHTML = `

<img src="${photo}">

<button
class="delete-btn"
onclick="deletePhoto(${albumIndex}, ${photoIndex})"
>

写真削除

</button>

`;

gallery.appendChild(photoCard);

});

});

}

function uploadPhotos(albumIndex, event){

const files =
Array.from(event.target.files);

const data = getData();

let loaded = 0;

files.forEach(file => {

const reader = new FileReader();

reader.onload = e => {

data[currentPrefecture][albumIndex]
.photos
.push(e.target.result);

loaded++;

if(loaded === files.length){

saveData(data);

renderAlbums();

showAlert(
'写真を追加しました'
);

}

};

reader.readAsDataURL(file);

});

}

function deletePhoto(albumIndex, photoIndex){

const data = getData();

data[currentPrefecture][albumIndex]
.photos
.splice(photoIndex,1);

saveData(data);

renderAlbums();

showAlert(
'写真を削除しました'
);

}

window.onclick = e => {

if(e.target === modal){

closeModal();

}

};

const width = 1000;
const height = 1200;

const svg = d3
.select('#map')
.append('svg')
.attr('viewBox',
`0 0 ${width} ${height}`);

const projection = d3.geoMercator()
.center([137,38])
.scale(1700)
.translate([width/2,height/2]);

const path =
d3.geoPath().projection(projection);

d3.json(
'https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson'
)
.then(data => {

svg.selectAll('path')
.data(data.features)
.enter()
.append('path')
.attr('class','prefecture')
.attr('d', path)
.attr('id',
d => d.properties.nam_ja)
.on('click', (event,d) => {

openModal(d.properties.nam_ja);

});

paintMap();

});

function paintMap(){

const data = getData();

document
.querySelectorAll('.prefecture')
.forEach(pref => {

const name = pref.id;

const albums = data[name] || [];

if(albums.length > 0){

pref.style.fill =
albums[albums.length - 1].color;

}else{

pref.style.fill = 'white';

}

});

}

</script>

</body>
</html>
