<header>

<div style="text-align:center; padding:15px; background:white;">

<script>
const CLIENT_ID = '1056269199594-iqiu3isr31l990fsv7oh5g0bgolfs8ei.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCbNpT1jzvscfRvM9KR775uypil01PWToM';
const FOLDER_ID = '130mpd1jAO0Qh9NS96838QbZ6Y9Tmqzum'; 

const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let lastGisResponse = null;
let currentPrefecture = '';
let albumData = {};
let unsubscribeSnapshot = null;
let isSaving = false;
const modal = document.getElementById('modal');

function gapiLoaded(){
  gapi.load('client', async()=>{
    await gapi.client.init({
      apiKey:API_KEY,
      discoveryDocs:[DISCOVERY_DOC]
    });
    initializeGis();
  });
}

function initializeGis(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){
        showAlert('Google Drive接続失敗: ' + resp.error);
        return;
      }
      lastGisResponse = resp;
      showAlert('Google Drive接続完了');
    }
  });
}

gapiLoaded();

// 💡 修正：原因切り分けのため、確実に権限が通る「各自のuser.uid」のコレクション構造にリダイレクト
async function saveAlbums(){
  const user = window.auth.currentUser;
  if(!user) return;
  
  isSaving = true;
  try {
    const docRef = window.doc(window.db, "albums", user.uid); // user.uid に変更
    await window.setDoc(docRef, { data: albumData });
    console.log("Firebase保存成功", albumData);
  } catch(e) {
    console.error("Firebase保存エラー詳細:", e);
    showAlert("❌ クラウド保存失敗！エラー理由: " + (e.message || e));
  }
  
  setTimeout(() => { isSaving = false; }, 1000);
}

async function loadAndStartSync(){
  const user = window.auth.currentUser;
  if(!user) return;

  try {
    const docRef = window.doc(window.db, "albums", user.uid); // user.uid に変更
    const docSnap = await window.getDoc(docRef);
    
    if(docSnap.exists()){
      const incomingData = docSnap.data().data;
      if (incomingData && Object.keys(incomingData).length > 0) {
        albumData = incomingData;
        console.log("初期データロード成功:", albumData);
      }
    }
    paintPrefecture();
    if(modal.style.display === 'flex') {
      renderAlbums();
    }
  } catch (err) {
    console.error("初期データロード失敗詳細:", err);
    showAlert("❌ クラウドデータの読み込みに失敗しました: " + (err.message || err));
  }

  if(unsubscribeSnapshot) unsubscribeSnapshot();

  unsubscribeSnapshot = window.onSnapshot(window.doc(window.db, "albums", user.uid), (docSnap) => {
    if (isSaving) return; 

    if(docSnap.exists()){
      const incomingData = docSnap.data().data;
      if (incomingData && Object.keys(incomingData).length > 0) {
        albumData = incomingData;
      }
    }
    paintPrefecture();
    if(modal.style.display === 'flex') {
      renderAlbums();
    }
  }, (error) => {
    console.error("同期エラー詳細:", error);
  });
}

async function loadJapanMap(){
  const response = await fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson');
  const topoData = await response.json();
  const geojson = topojson.feature(topoData, topoData.objects.japan);
  const svg = d3.select('#japan-map');

  const projection = d3.geoMercator()
    .center([137,38])
    .scale(1800)
    .translate([500,500]);

  const path = d3.geoPath().projection(projection);

  svg.selectAll('path')
    .data(geojson.features)
    .enter()
    .append('path')
    .attr('d',path)
    .attr('class','prefecture')
    .attr('id',d=>d.properties.nam_ja)
    .on('click',(event,d)=>{
      if (!window.auth.currentUser) {
        showAlert('ログイン後にアルバムを操作できます');
        return;
      }
      currentPrefecture = d.properties.nam_ja;
      document.getElementById('modalTitle').innerText = currentPrefecture + ' のアルバム';
      modal.style.display='flex';
      renderAlbums();
    });
}

loadJapanMap();

function closeModal(){
  modal.style.display='none';
}

async function createAlbum(){
  const name = document.getElementById('albumName').value.trim();
  const color = document.getElementById('albumColor').value;

  if(!name){
    showAlert('アルバム名を入力してください');
    return;
  }

  if(!albumData[currentPrefecture]){
    albumData[currentPrefecture]=[];
  }

  albumData[currentPrefecture].push({
    name:name,
    color:color,
    files:[]
  });

  paintPrefecture();
  renderAlbums();
  document.getElementById('albumName').value = '';

  await saveAlbums();
  showAlert('アルバム作成・保存完了！');
}

function renderAlbums(){
  const list = document.getElementById('albumList');
  list.innerHTML='';
  const albums = albumData[currentPrefecture] || [];

  if(albums.length===0){
    list.innerHTML='<p>アルバムがありません</p>';
    return;
  }

  albums.forEach((album,index)=>{
    const card = document.createElement('div');
    card.className='album-card';
    card.style.borderColor=album.color;

    const fileCount = album.files ? album.files.length : 0;
    const existingGallery = document.getElementById(`gallery-${index}`);
    const isOpened = existingGallery ? (existingGallery.style.display === 'grid') : false;

    card.innerHTML = `
      <div class="album-title">
        <span class="album-color" style="background:${album.color}"></span>
        ${album.name}
      </div>
      <div class="album-actions">
        <label class="upload-btn">
          写真・動画追加
          <input style="display:none" type="file" multiple accept="image/*,video/*" onchange="handleUploadSequence(${index},event)">
        </label>
        <button class="delete-btn" onclick="confirmDeleteAlbum(${index})">削除</button>
      </div>
      <button class="toggle-preview-btn" id="toggle-btn-${index}" onclick="toggleGallery(${index})">
        ${isOpened ? '▲ プレビューを閉じる' : `📸 ${fileCount}件の思い出をプレビュー`}
      </button>
      <div class="gallery" id="gallery-${index}" style="display: ${isOpened ? 'grid' : 'none'};"></div>
    `;
    list.appendChild(card);
    
    if(isOpened) {
      renderGallery(index);
    }
  });
}

function toggleGallery(index) {
  const gallery = document.getElementById(`gallery-${index}`);
  const btn = document.getElementById(`toggle-btn-${index}`);
  
  if (gallery.style.display === 'grid') {
    gallery.style.display = 'none';
    btn.innerText = `📸 ${albumData[currentPrefecture][index].files.length}件の思い出をプレビュー`;
  } else {
    renderGallery(index); 
    gallery.style.display = 'grid';
    btn.innerText = `▲ プレビューを閉じる`;
  }
}

async function confirmDeleteAlbum(index) {
  const albumName = albumData[currentPrefecture][index].name;
  const proceed = window.confirm(`本当に<${albumName}>を削除しますか`);
  
  if (proceed) {
    albumData[currentPrefecture].splice(index,1);
    paintPrefecture();
    renderAlbums();
    
    await saveAlbums();
    showAlert('アルバム削除完了');
  }
}

function paintPrefecture(){
  const all = document.querySelectorAll('.prefecture');
  all.forEach(pref=>{ pref.style.fill='white'; });

  Object.keys(albumData).forEach(pref=>{
    const albums = albumData[pref];
    if(albums.length>0){
      const color = albums[albums.length-1].color;
      const target = document.getElementById(pref);
      if(target){ target.style.fill=color; }
    }
  });
}

async function getOrCreateFolder(folderName, parentId) {
  try {
    const response = await gapi.client.drive.files.list({
      q: `name = '${folderName}' and mimeType = 'application/vnd.google-apps.folder' and '${parentId}' in parents and trashed = false`,
      fields: 'files(id)'
    });
    
    const files = response.result.files;
    if (files && files.length > 0) {
      return files[0].id;
    }
  } catch(e) {
    console.log("フォルダ検索をスキップし、新規作成を試みます");
  }
  
  const createResponse = await gapi.client.drive.files.create({
    resource: {
      name: folderName,
      mimeType: 'application/vnd.google-apps.folder',
      parents: [parentId]
    },
    fields: 'id'
  });
  return createResponse.result.id;
}

async function handleUploadSequence(albumIndex, event) {
  const files = Array.from(event.target.files);
  if(files.length === 0) return;

  const currentToken = gapi.client.getToken();
  
  if (!currentToken || !currentToken.access_token) {
    showAlert("Google Driveへの接続を確認しています。ポップアップが表示されたら許可してください。");
    
    tokenClient.callback = async (resp) => {
      if (resp.error) {
        showAlert("Driveへのアクセス許可が降りませんでした: " + resp.error);
        return;
      }
      lastGisResponse = resp;
      await proceedWithUpload(albumIndex, files);
    };
    
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    await proceedWithUpload(albumIndex, files);
  }
}

async function proceedWithUpload(albumIndex, files) {
  showAlert(`${files.length}件のファイルをアップロード中...`);
  let targetFolderId = FOLDER_ID; 

  try {
    const prefFolderId = await getOrCreateFolder(currentPrefecture, FOLDER_ID);
    const album = albumData[currentPrefecture][albumIndex];
    targetFolderId = await getOrCreateFolder(album.name, prefFolderId);
  } catch(err) {
    console.warn("フォルダ階層化に失敗したためルート直下に保存します:", err);
  }

  try {
    for(const file of files){
      await uploadToDrive(file, albumIndex, targetFolderId);
    }
    showAlert('アップロード完了');
  } catch(err) {
    console.error(err);
    showAlert('アップロード中にエラーが発生しました: ' + (err.message || err));
  }
}

async function uploadToDrive(file, albumIndex, targetFolderId){
  const token = gapi.client.getToken();
  const accessToken = token.access_token;
  const user = window.auth.currentUser; 
  
  const metadata = {
    name:file.name,
    parents:[targetFolderId]
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file',file);

  const response = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {
      method:'POST',
      headers:new Headers({ Authorization:'Bearer '+accessToken }),
      body:form
    }
  );

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Driveへの送信失敗(${response.status}): ${errText}`);
  }

  const data = await response.json();

  await gapi.client.drive.permissions.create({
    fileId:data.id,
    resource:{ role:'reader', type:'anyone' }
  });

  albumData[currentPrefecture][albumIndex].files.push({
    id: data.id, 
    type: file.type,
    uploader: user.uid
  });

  renderGallery(albumIndex);
  const btn = document.getElementById(`toggle-btn-${albumIndex}`);
  if(btn && document.getElementById(`gallery-${albumIndex}`).style.display !== 'grid') {
    btn.innerText = `📸 ${albumData[currentPrefecture][albumIndex].files.length}件の思い出をプレビュー`;
  }

  await saveAlbums();
}

function renderGallery(index){
  const gallery = document.getElementById(`gallery-${index}`);
  if(!gallery) return;
  gallery.innerHTML='';

  const user = window.auth.currentUser;
  const files = albumData[currentPrefecture][index].files || [];
  const token = gapi.client.getToken();
  const accessToken = token ? token.access_token : null;

  files.forEach((file, fileIndex) => {
    const fileId = file.id || (file.url ? file.url.split('id=')[1] : null);
    if (!fileId) return;

    const itemDiv = document.createElement('div');
    itemDiv.className = 'gallery-item';
    
    const origUrl = `https://drive.google.com/uc?id=${fileId}`;
    
    const isMyFile = !file.uploader || file.uploader === user.uid;
    if (isMyFile) {
      const delBtn = document.createElement('button');
      delBtn.className = 'file-delete-btn';
      delBtn.innerText = '×';
      delBtn.onclick = (e) => {
        e.stopPropagation(); 
        deleteFile(index, fileIndex);
      };
      itemDiv.appendChild(delBtn);
    }
    
    const imgEl = document.createElement('img');
    imgEl.alt = "思い出";
    imgEl.onclick = () => window.open(origUrl, '_blank');
    
    if (accessToken) {
      fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      })
      .then(res => {
        if(!res.ok) throw new Error();
        return res.blob();
      })
      .then(blob => {
        const blobUrl = URL.createObjectURL(blob);
        imgEl.src = blobUrl;
      })
      .catch(() => {
        imgEl.src = `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
      });
    } else {
      imgEl.src = `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
    }

    itemDiv.appendChild(imgEl);
    gallery.appendChild(itemDiv);
  });
}

async function deleteFile(albumIndex, fileIndex) {
  const proceed = window.confirm("この写真/動画をアルバムから削除しますか？\n(Google Drive上の元のファイルは削除されません)");
  if (!proceed) return;

  albumData[currentPrefecture][albumIndex].files.splice(fileIndex, 1);
  renderGallery(albumIndex);

  await saveAlbums();
  showAlert("ファイルを削除しました");
}

function showAlert(message){
  const box = document.getElementById('customAlert');
  box.innerText = message;
  box.style.display='block';
  setTimeout(()=>{ box.style.display='none'; },5000); 
}

// 💡 修正の最重要ポイント：認証状態の完全確定とGIS（Google Identity Services）の順序制御
window.addEventListener('load', () => {
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const userInfo = document.getElementById('userInfo');

  window.onAuthStateChanged(window.auth, async (user)=>{
    if(user){
      userInfo.innerText = 'ログイン済み';
      loginBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      
      // 💡 認証が100%通ったのを確認してから、Firestoreのデータロードを開始
      await loadAndStartSync(); 
    }else{
      userInfo.innerText = '未ログイン';
      loginBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
      if(unsubscribeSnapshot) {
        unsubscribeSnapshot();
        unsubscribeSnapshot = null;
      }
      albumData = {}; 
      paintPrefecture(); 
    }
  });

  loginBtn.addEventListener('click', async () => {
    try{
      const provider = new window.GoogleAuthProvider();
      // 1. Firebase Authポップアップを完了させる
      const result = await window.signInWithPopup(window.auth, provider);
      
      // 2. Authログイン完了が検知された後に、Google Driveのアクセストークンを要求する
      setTimeout(() => {
        if(tokenClient) {
          tokenClient.requestAccessToken({ prompt:'consent' });
        }
      }, 500);
      
      showAlert('ログイン成功');
    }catch(err){
      console.error(err);
      showAlert('ログイン失敗: ' + err.message);
    }
  });

  logoutBtn.addEventListener('click', async () => {
    try {
      await window.signOut(window.auth);
      showAlert('ログアウトしました');
    } catch (err) {
      console.error(err);
      showAlert('ログアウトに失敗しました');
    }
  });
});
</script>
</body>
</html>
