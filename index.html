<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本アルバムマップ</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f3f4f6;
    }

    header {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .japan-map {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .prefecture {
      background: white;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .prefecture:hover {
      transform: translateY(-2px);
    }

    .pref-name {
      font-size: 16px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .close-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .album-create {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .album-create input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .album-create button {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    .album-card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .album-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .photo-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .photo-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .photo-actions {
      padding: 8px;
    }

    .delete-btn {
      width: 100%;
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .japan-map {
        grid-template-columns: repeat(2, 1fr);
      }

      header {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

<header>
  日本アルバムマップ
</header>

<div class="container">
  <div id="japanMap" class="japan-map"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">閉じる</button>
    </div>

    <div class="album-create">
      <input type="text" id="albumName" placeholder="アルバム名を入力">
      <input type="color" id="albumColor" value="#10b981">
      <button onclick="createAlbum()">アルバム作成</button>
    </div>

    <div id="albumList"></div>

  </div>
</div>

<script>

const prefectures = [
  '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
  '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
  '新潟県','富山県','石川県','福井県','山梨県','長野県',
  '岐阜県','静岡県','愛知県','三重県',
  '滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
  '鳥取県','島根県','岡山県','広島県','山口県',
  '徳島県','香川県','愛媛県','高知県',
  '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県',
  '沖縄県'
];

const japanMap = document.getElementById('japanMap');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const albumList = document.getElementById('albumList');

let currentPrefecture = '';

function getData() {
  return JSON.parse(localStorage.getItem('travelAlbums') || '{}');
}

function saveData(data) {
  localStorage.setItem('travelAlbums', JSON.stringify(data));
}

function renderMap() {

  const data = getData();

  japanMap.innerHTML = '';

  prefectures.forEach(pref => {

    const albums = data[pref] || [];

    const card = document.createElement('div');

    card.className = 'prefecture';

    if (albums.length > 0) {
      card.style.background = albums[albums.length - 1].color;
      card.style.color = 'white';
    }

    card.innerHTML = `
      <div class="pref-name">${pref}</div>
    `;

    card.onclick = () => openModal(pref);

    japanMap.appendChild(card);

  });

}

function openModal(pref) {

  currentPrefecture = pref;

  modalTitle.innerText = pref + ' のアルバム';

  modal.style.display = 'flex';

  renderAlbums();

}

function closeModal() {

  modal.style.display = 'none';

}

function createAlbum() {

  const name = document.getElementById('albumName').value.trim();

  const color = document.getElementById('albumColor').value;

  if (!name) {
    alert('アルバム名を入力してください');
    return;
  }

  const data = getData();

  if (!data[currentPrefecture]) {
    data[currentPrefecture] = [];
  }

  const exists = data[currentPrefecture].some(a => a.name === name);

  if (exists) {
    alert('同じアルバム名があります');
    return;
  }

  data[currentPrefecture].push({
    name,
    color,
    photos: []
  });

  saveData(data);

  document.getElementById('albumName').value = '';

  renderAlbums();

  renderMap();

}

function renderAlbums() {

  const data = getData();

  const albums = data[currentPrefecture] || [];

  albumList.innerHTML = '';

  if (albums.length === 0) {
    albumList.innerHTML = '<p>アルバムがありません</p>';
    return;
  }

  albums.forEach((album, albumIndex) => {

    const card = document.createElement('div');

    card.className = 'album-card';

    card.innerHTML = `
      <div class="album-title">${album.name}</div>

      <p>
        色：
        <span style="
          display:inline-block;
          width:20px;
          height:20px;
          background:${album.color};
          border-radius:50%;
          vertical-align:middle;
        "></span>
      </p>

      <input
        type="file"
        multiple
        accept="image/*"
        onchange="uploadPhotos(${albumIndex}, event)"
      >

      <div class="gallery" id="gallery-${albumIndex}"></div>
    `;

    albumList.appendChild(card);

    const gallery = card.querySelector(`#gallery-${albumIndex}`);

    album.photos.forEach((photo, photoIndex) => {

      const photoCard = document.createElement('div');

      photoCard.className = 'photo-card';

      photoCard.innerHTML = `
        <img src="${photo}">

        <div class="photo-actions">
          <button
            class="delete-btn"
            onclick="deletePhoto(${albumIndex}, ${photoIndex})"
          >
            削除
          </button>
        </div>
      `;

      gallery.appendChild(photoCard);

    });

  });

}

function uploadPhotos(albumIndex, event) {

  const files = Array.from(event.target.files);

  const data = getData();

  let loaded = 0;

  files.forEach(file => {

    const reader = new FileReader();

    reader.onload = e => {

      data[currentPrefecture][albumIndex].photos.push(e.target.result);

      loaded++;

      if (loaded === files.length) {

        saveData(data);

        renderAlbums();

      }

    };

    reader.readAsDataURL(file);

  });

}

function deletePhoto(albumIndex, photoIndex) {

  const data = getData();

  data[currentPrefecture][albumIndex].photos.splice(photoIndex, 1);

  saveData(data);

  renderAlbums();

}

window.onclick = e => {

  if (e.target === modal) {

    closeModal();

  }

};

renderMap();

</script>

</body>
</html>
